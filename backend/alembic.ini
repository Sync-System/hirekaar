[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Real URL always comes from the DATABASE_URL environment variable (see alembic/env.py).
# This placeholder is not used when DATABASE_URL is set (normal `alembic upgrade` flow).
sqlalchemy.url = postgresql+psycopg2://hirekaar:hirekaar@127.0.0.1:5433/hirekaar

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
