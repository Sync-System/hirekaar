# kubectl apply -f secret-web.yaml (after copying and filling values)
apiVersion: v1
kind: Secret
metadata:
  name: hirekaar-web-env
  namespace: hirekaar
type: Opaque
stringData:
  # In-cluster Service name for the API Deployment (see api-deployment.yaml).
  API_BASE_URL: "http://hirekaar-api:8000"
  NEXT_PUBLIC_APP_URL: "https://your-app.example.com"
  NODE_ENV: "production"
