apiVersion: v1
kind: Service
metadata:
  name: hirekaar-api
  namespace: hirekaar
spec:
  selector:
    app: hirekaar-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hirekaar-api
  namespace: hirekaar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hirekaar-api
  template:
    metadata:
      labels:
        app: hirekaar-api
    spec:
      containers:
        - name: api
          image: hirekaar-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: hirekaar-api-secret
          readinessProbe:
            httpGet:
              path: /health/db
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
