apiVersion: v1
kind: Service
metadata:
  name: hirekaar-web
  namespace: hirekaar
spec:
  selector:
    app: hirekaar-web
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hirekaar-web
  namespace: hirekaar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hirekaar-web
  template:
    metadata:
      labels:
        app: hirekaar-web
    spec:
      containers:
        - name: web
          image: hirekaar-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: hirekaar-web-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
