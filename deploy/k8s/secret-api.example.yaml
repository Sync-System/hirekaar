# kubectl create secret generic hirekaar-api-secret -n hirekaar --from-literal=DATABASE_URL='postgresql+psycopg2://...' \
#   --from-literal=JWT_SECRET='$(openssl rand -hex 32)' \
#   --from-literal=CORS_ORIGINS='https://your-app.example.com' \
#   --from-literal=ENVIRONMENT=production
apiVersion: v1
kind: Secret
metadata:
  name: hirekaar-api-secret
  namespace: hirekaar
type: Opaque
stringData:
  DATABASE_URL: "postgresql+psycopg2://hirekaar:PASSWORD@hirekaar-postgres:5432/hirekaar"
  JWT_SECRET: "replace-with-openssl-rand-hex-32-min-24-chars"
  CORS_ORIGINS: "https://your-app.example.com"
  ENVIRONMENT: "production"
  # Optional: demo wallet top-up (keep false in real prod)
  ALLOW_WALLET_DEMO_TOPUP: "false"
